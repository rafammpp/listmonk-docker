services:
  db:
    image: postgres:14-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
      - ./secrets/secrets.env
    environment:
      - POSTGRES_USER=listmonk
      - POSTGRES_DB=listmonk
    networks:
      - internal
    volumes:
      - ./data/db:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listmonk -d listmonk"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: listmonk/listmonk:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: [ "sh", "-ec", "export LISTMONK_db__password=\"$$POSTGRES_PASSWORD\"; ./listmonk --install --idempotent --yes --config '' && ./listmonk --upgrade --yes --config '' && ./listmonk --config ''" ]
    env_file:
      - .env
      - ./secrets/secrets.env
    networks:
      - internal
      - public
    ports:
      - "127.0.0.1:9000:9000"
    environment:
      - LISTMONK_app__address=0.0.0.0:9000
      - LISTMONK_db__host=db
      - LISTMONK_db__port=5432
      - LISTMONK_db__user=listmonk
      - LISTMONK_db__database=listmonk
      - LISTMONK_db__ssl_mode=disable
      - LISTMONK_ADMIN_USER=${LISTMONK_ADMIN_USER:-}
      - LISTMONK_ADMIN_PASSWORD=${LISTMONK_ADMIN_PASSWORD:-}
    volumes:
      - ./uploads:/listmonk/uploads
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
      - public
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      app:
        condition: service_started

  backup:
    build:
      context: ./backup
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - .env
      - ./secrets/secrets.env
    environment:
      - R2_REGION=auto
    networks:
      - internal
      - public
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  public:
    driver: bridge
  internal:
    internal: true
